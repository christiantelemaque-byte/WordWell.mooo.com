<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Word Well — Christian Télémaque | Freelance Content Writing</title>
  <style>
    /* ---------- RESET & BASE (classic/editorial) ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #FCF9F5;   /* warm ivory background — quiet luxury */
      color: #1C1A1A;
      line-height: 1.5;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
    }

    /* refined serif for headings — classic editorial feel */
    h1, h2, h3, .logo, .blog-title, .author-info h3 {
      font-family: 'Cormorant Garamond', 'Times New Roman', Georgia, serif;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    /* ---------- TYPOGRAPHY (modern CSS best practices) ---------- */
    h1 {
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      line-height: 1.2;
      font-weight: 500;
    }
    h2 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 500;
      margin: 1.5rem 0 1rem 0;
      letter-spacing: -0.01em;
      border-left: 4px solid #C6A43B;
      padding-left: 1.2rem;
    }
    .blog-title {
      font-size: 1.5rem;
      font-weight: 500;
      line-height: 1.3;
    }
    body, p, .blog-excerpt, .nav-btn, .btn, input, textarea {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    }
    /* improved readability */
    p, .blog-excerpt, .author-info p {
      max-width: 70ch;
      color: #3A3A3A;
    }
    /* text-wrap balance for elegant headings */
    .banner-text h1, .blog-title, h2 {
      text-wrap: balance;
    }

    /* ---------- BANNER with integrated custom image ---------- */
    .hero-banner {
      width: 100%;
      height: 480px;
      background-size: cover;
      background-position: center 40%;
      background-repeat: no-repeat;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #2C3A2A;  /* fallback deep forest */
    }
    /* subtle overlay for text contrast */
    .banner-overlay {
      background: rgba(0, 0, 0, 0.38);
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      backdrop-filter: brightness(0.96);
    }
    .banner-text {
      max-width: 800px;
      padding: 0 1rem;
    }
    .banner-text h1 {
      color: #FFFFFF;
      text-shadow: 0 2px 12px rgba(0,0,0,0.2);
      font-weight: 500;
      letter-spacing: -0.02em;
    }
    .banner-text p {
      font-size: clamp(1.1rem, 2.5vw, 1.45rem);
      color: #F3E9D2;
      margin-top: 0.75rem;
      font-weight: 400;
      max-width: 100%;
    }

    /* ---------- NAVBAR (clean, sharp, minimal) ---------- */
    .navbar {
      background: rgba(255, 255, 245, 0.98);
      backdrop-filter: blur(0px);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.05);
      padding: 1rem 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #EBE3D5;
    }
    .logo {
      font-size: 1.9rem;
      font-weight: 500;
      color: #1E2F21;
      letter-spacing: -0.3px;
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      color: #1E2F21;
    }
    .nav-links {
      display: flex;
      gap: 1.8rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .nav-btn {
      background: none;
      border: none;
      font-weight: 450;
      font-size: 0.95rem;
      cursor: pointer;
      padding: 0.4rem 0.2rem;
      transition: 0.2s ease;
      border-radius: 0px;
      color: #2C3E2F;
      letter-spacing: -0.2px;
      border-bottom: 1px solid transparent;
    }
    .nav-btn:hover {
      border-bottom-color: #C6A43B;
      background: none;
      transform: translateY(-1px);
    }
    .btn-primary {
      background: #1E2F21;
      color: white;
      border-radius: 40px;
      padding: 0.5rem 1.3rem;
      border: none;
      font-weight: 500;
    }
    .btn-primary:hover {
      background: #2C4A2E;
      transform: none;
      border-bottom: none;
    }
    .btn-primary-outline {
      border: 1px solid #2C3E2F;
      background: transparent;
      color: #2C3E2F;
      border-radius: 40px;
      padding: 0.5rem 1.2rem;
    }
    .btn-primary-outline:hover {
      background: #2C3E2F10;
      border-bottom: 1px solid #2C3E2F;
    }

    /* main container (max-width & padding) */
    .container {
      max-width: 1280px;
      margin: 2.5rem auto;
      padding: 0 2rem;
    }

    /* ---------- AUTHOR CARD (elevated classic style) ---------- */
    .author-card {
      background: #FFFFFF;
      border-radius: 28px;
      padding: 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
      margin-bottom: 2.8rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
      border: 1px solid #EBE3D5;
      transition: box-shadow 0.2s;
    }
    .profile-pic {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #C6A43B;
      background: #F2EBE0;
    }
    .author-info h3 {
      font-size: 1.9rem;
      font-weight: 500;
      margin-bottom: 0.3rem;
      color: #1A2A1C;
    }
    .social-links {
      margin-top: 0.8rem;
    }
    .social-links a {
      text-decoration: none;
      color: #6F5B3E;
      margin-right: 1.5rem;
      font-weight: 500;
      font-size: 0.9rem;
      border-bottom: 1px dotted #DBCEBC;
      transition: 0.2s;
    }
    .social-links a:hover {
      color: #C6A43B;
      border-bottom-color: #C6A43B;
    }

    /* ---------- BLOG GRID (clean, generous spacing) ---------- */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2.2rem;
      margin: 2rem 0 2rem;
    }
    .blog-card {
      background: #FFFFFF;
      border-radius: 24px;
      overflow: hidden;
      transition: all 0.25s ease;
      border: 1px solid #EFE8DE;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
    }
    .blog-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.08);
      border-color: #E2D6C8;
    }
    .blog-img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      background: #E9E0D2;
      transition: transform 0.4s ease;
    }
    .blog-card:hover .blog-img {
      transform: scale(1.02);
    }
    .blog-card-content {
      padding: 1.6rem;
    }
    .blog-title {
      font-size: 1.45rem;
      margin-bottom: 0.6rem;
      line-height: 1.3;
    }
    .blog-excerpt {
      color: #4A4A4A;
      font-size: 0.9rem;
      line-height: 1.45;
      margin-bottom: 1.2rem;
    }
    .read-link {
      background: none;
      border: none;
      color: #C6A43B;
      font-weight: 550;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 0.3px;
      padding: 0;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .read-link:hover {
      color: #8B6C2E;
      gap: 0.6rem;
    }

    /* panels & forms (classic minimal) */
    .panel {
      background: #FFFFFF;
      border-radius: 28px;
      padding: 2rem;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.03);
      margin: 1.5rem 0;
      border: 1px solid #EBE3D5;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    label {
      font-weight: 500;
      display: block;
      margin-bottom: 0.4rem;
      color: #2C3E2F;
      font-size: 0.85rem;
      letter-spacing: 0.3px;
    }
    input, textarea, select {
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 18px;
      border: 1px solid #E2D6C8;
      background: #FEFCF8;
      font-size: 0.95rem;
      transition: 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #C6A43B;
      box-shadow: 0 0 0 3px rgba(198, 164, 59, 0.1);
    }
    button {
      cursor: pointer;
    }
    .btn {
      padding: 0.7rem 1.6rem;
      border-radius: 40px;
      border: none;
      font-weight: 500;
      background: #F1EAE0;
      transition: 0.2s;
    }
    .btn-dark {
      background: #1E2F21;
      color: white;
    }
    .btn-dark:hover {
      background: #2C4A2E;
      transform: translateY(-2px);
    }
    .subscription-badge {
      background: #F5F0E8;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 500;
      color: #6F5B3E;
    }
    .error {
      color: #B1624B;
      font-size: 0.85rem;
      margin-top: 0.3rem;
    }
    footer {
      background: #EFEADF;
      color: #4A3A2A;
      text-align: center;
      padding: 2rem;
      margin-top: 4rem;
      border-top: 1px solid #DDD2C0;
      font-size: 0.85rem;
    }
    hr {
      margin: 1.5rem 0;
      border: 0;
      height: 1px;
      background: #EBE3D5;
    }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    /* utility */
    @media (max-width: 720px) {
      .navbar { flex-direction: column; gap: 0.8rem; align-items: stretch; text-align: center; }
      .nav-links { justify-content: center; }
      .container { padding: 0 1.2rem; }
      .author-card { flex-direction: column; text-align: center; }
      .blog-grid { gap: 1.5rem; }
      h2 { border-left: none; padding-left: 0; }
    }
  </style>
</head>
<body>

<!-- BANNER section with integrated custom image from GitHub (raw) -->
<div class="hero-banner" id="heroBanner">
  <div class="banner-overlay">
    <div class="banner-text">
      <h1>Word Well</h1>
      <p>Freelance Content Writer | SEO Blog Posts, Copywriting & Ghostwriting</p>
    </div>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">✍️ Word Well</div>
  <div class="nav-links">
    <button class="nav-btn" data-nav="home">📖 Journal</button>
    <button class="nav-btn" data-nav="account">👤 Account</button>
    <button id="adminNavBtn" class="nav-btn" style="display: none;">⚙️ Write</button>
    <button id="loginNavBtn" class="nav-btn btn-primary-outline">🔐 Log in</button>
    <button id="registerNavBtn" class="nav-btn btn-primary">Join</button>
    <button id="logoutBtn" class="nav-btn" style="display: none;">Log out</button>
  </div>
</div>

<!-- MAIN DYNAMIC VIEW -->
<div id="appContainer" class="container"></div>

<footer>
  <p>© 2025 Word Well — Freelance Content Writing by Christian Télémaque</p>
  <p id="footerLinks">🔗 <a id="linkedinFooter" href="#" target="_blank" style="color:#6F5B3E; text-decoration: none; border-bottom: 1px dotted;">LinkedIn</a> &nbsp;| ✉️ <span id="emailFooter"></span></p>
</footer>

<script>
  // ====================== CONFIGURATION (YOUR BRAND) ==================
  const CONFIG = {
    // DIRECT RAW BANNER IMAGE URL (from your GitHub)
    bannerImageURL: "https://raw.githubusercontent.com/christiantelemaque-byte/WordWell.mooo.com/main/luxecompanions-images/ChatGPT%20Image%20May%2012%2C%202026%2C%2006_25_11%20PM.png",
    profilePictureURL: "https://ui-avatars.com/api/?background=2b5e2f&color=fff&name=Christian+Télémaque&size=128&bold=true",
    linkedIn: "https://www.linkedin.com/in/christian-telemaque-writer",
    email: "christiantelemaque@gmail.com",
    writerName: "Christian Télémaque"
  };

  // apply banner background with RAW image
  const bannerDiv = document.getElementById('heroBanner');
  if (CONFIG.bannerImageURL) {
    bannerDiv.style.backgroundImage = `url(${CONFIG.bannerImageURL})`;
    bannerDiv.style.backgroundSize = "cover";
  } else {
    bannerDiv.style.background = "linear-gradient(135deg, #1f3b2c, #ab8e5c)";
  }

  // Footer dynamic links
  const linkedinFooter = document.getElementById('linkedinFooter');
  if(linkedinFooter) linkedinFooter.href = CONFIG.linkedIn;
  const emailFooterSpan = document.getElementById('emailFooter');
  if(emailFooterSpan) emailFooterSpan.innerText = CONFIG.email;
  
  // ========== DATA MODELS (localStorage) ==========
  let users = [];
  let posts = [];
  let currentUser = null;

  function loadData() {
    const storedUsers = localStorage.getItem('wordwell_users');
    const storedPosts = localStorage.getItem('wordwell_posts');
    users = storedUsers ? JSON.parse(storedUsers) : [];
    posts = storedPosts ? JSON.parse(storedPosts) : [];
    if (users.length === 0) {
      users.push({
        id: "u1",
        name: CONFIG.writerName,
        email: CONFIG.email,
        password: "Admin123",
        isAdmin: true,
        subscription: { active: false, expiryDate: null, plan: null }
      });
      users.push({
        id: "u2",
        name: "Reader Demo",
        email: "reader@example.com",
        password: "reader123",
        isAdmin: false,
        subscription: { active: false, expiryDate: null, plan: null }
      });
      localStorage.setItem('wordwell_users', JSON.stringify(users));
    }
    if (posts.length === 0) {
      posts = [
        { id: "p1", title: "The art of authentic storytelling", content: "In a world flooded with generic content, genuine human narrative creates emotional connection. As a freelance writer, I craft each sentence with care — blending SEO strategy with natural storytelling. Whether you need website copy, blog posts, or ghostwriting, Word Well delivers words that resonate. This is the core of what I do: words that feel honest, sound like you, and speak directly to your audience.", date: "2025-04-01", author: CONFIG.writerName, imageUrl: "https://images.pexels.com/photos/1181675/pexels-photo-1181675.jpeg?auto=compress&cs=tinysrgb&w=800" },
        { id: "p2", title: "SEO writing that reads like a conversation", content: "Search engines love relevance, but humans love personality. Combining both is an art. I provide SEO-optimised content that doesn't sound robotic — from long-form articles to persuasive landing pages. Monthly subscribers get exclusive templates, SEO checklists, and early access to new articles. Subscribe to support independent writing that actually performs.", date: "2025-04-05", author: CONFIG.writerName, imageUrl: "https://images.pexels.com/photos/270404/pexels-photo-270404.jpeg?auto=compress&cs=tinysrgb&w=800" },
        { id: "p3", title: "Ghostwriting: bringing your voice to life", content: "You have ideas, but not the time to write. Ghostwriting bridges that gap. I've helped executives, founders, and creators produce authentic LinkedIn posts, newsletters, and even entire books. Every piece sounds like you — just more polished. Let's collaborate on your next project. Quiet, professional, and always tailored.", date: "2025-04-10", author: CONFIG.writerName, imageUrl: "https://images.pexels.com/photos/4145190/pexels-photo-4145190.jpeg?auto=compress&cs=tinysrgb&w=800" }
      ];
      localStorage.setItem('wordwell_posts', JSON.stringify(posts));
    }
    const storedCurrent = localStorage.getItem('wordwell_currentUser');
    if (storedCurrent) currentUser = JSON.parse(storedCurrent);
    else currentUser = null;
  }

  function saveUsers() { localStorage.setItem('wordwell_users', JSON.stringify(users)); }
  function savePosts() { localStorage.setItem('wordwell_posts', JSON.stringify(posts)); }
  function saveCurrentUser() {
    if (currentUser) localStorage.setItem('wordwell_currentUser', JSON.stringify(currentUser));
    else localStorage.removeItem('wordwell_currentUser');
  }

  function findUserByEmail(email) { return users.find(u => u.email === email); }

  function setUserSubscription(userId, active, months = 1) {
    const userIndex = users.findIndex(u => u.id === userId);
    if (userIndex === -1) return false;
    let expiry = null;
    if (active) {
      const date = new Date();
      date.setMonth(date.getMonth() + months);
      expiry = date.toISOString();
    }
    users[userIndex].subscription = { active, expiryDate: expiry, plan: active ? 'monthly' : null };
    saveUsers();
    if (currentUser && currentUser.id === userId) {
      currentUser = users[userIndex];
      saveCurrentUser();
    }
    return true;
  }

  function isSubscriptionValid(user) {
    if (!user.subscription.active) return false;
    if (!user.subscription.expiryDate) return false;
    const expiry = new Date(user.subscription.expiryDate);
    return expiry > new Date();
  }

  // ========== RENDER ENGINE ==========
  let currentView = "home";

  function render() {
    const container = document.getElementById('appContainer');
    if (!container) return;

    const loginBtn = document.getElementById('loginNavBtn');
    const registerBtn = document.getElementById('registerNavBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const adminNav = document.getElementById('adminNavBtn');
    if (currentUser) {
      loginBtn.style.display = 'none';
      registerBtn.style.display = 'none';
      logoutBtn.style.display = 'inline-block';
      adminNav.style.display = currentUser.isAdmin ? 'inline-block' : 'none';
    } else {
      loginBtn.style.display = 'inline-block';
      registerBtn.style.display = 'inline-block';
      logoutBtn.style.display = 'none';
      adminNav.style.display = 'none';
    }

    if (currentView === "home") renderHome(container);
    else if (currentView === "account") renderAccount(container);
    else if (currentView === "admin") {
      if (currentUser && currentUser.isAdmin) renderAdminPanel(container);
      else { alert("Admin access only."); currentView = "home"; render(); }
    }
    else if (currentView === "blogDetail") renderBlogDetail(container);
    else if (currentView === "login") renderLogin(container);
    else if (currentView === "register") renderRegister(container);
    else renderHome(container);
  }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  function getExcerpt(content, len=115) { return content.length > len ? content.slice(0, len) + "…" : content; }

  function renderHome(container) {
    if (!posts.length) {
      container.innerHTML = `<div class="panel"><p>No published articles yet. Check back soon.</p></div>`;
      return;
    }
    let html = `<div class="author-card">
      <img class="profile-pic" src="${CONFIG.profilePictureURL}" alt="Christian Télémaque">
      <div class="author-info">
        <h3>${CONFIG.writerName}</h3>
        <p>Freelance content writer & strategist. Human-first, SEO-smart storytelling. I help brands find their voice and readers find meaning.</p>
        <div class="social-links">
          <a href="${CONFIG.linkedIn}" target="_blank">🔗 LinkedIn</a>
          <a href="mailto:${CONFIG.email}">✉️ ${CONFIG.email}</a>
        </div>
      </div>
    </div>
    <h2>From the desk</h2>
    <div class="blog-grid">`;
    
    posts.slice().reverse().forEach(post => {
      html += `
        <div class="blog-card">
          <img class="blog-img" src="${post.imageUrl || 'https://images.pexels.com/photos/256514/pexels-photo-256514.jpeg?auto=compress&cs=tinysrgb&w=600'}" alt="essay visual" onerror="this.src='https://placehold.co/600x400/F2EBE0/1E2F21?text=Word+Well'">
          <div class="blog-card-content">
            <div class="blog-title">${escapeHtml(post.title)}</div>
            <div class="blog-excerpt">${escapeHtml(getExcerpt(post.content, 90))}</div>
            <button class="read-link" data-postid="${post.id}">Read full story →</button>
            <div style="font-size:0.7rem; margin-top:12px; color:#9B8C74;">${post.date} — ${escapeHtml(post.author)}</div>
          </div>
        </div>`;
    });
    html += `</div>`;
    container.innerHTML = html;
    document.querySelectorAll('.read-link').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const postId = btn.getAttribute('data-postid');
        if (!currentUser) {
          alert("🔐 Please log in or create a free account to read full articles.");
          currentView = "login";
          render();
          return;
        }
        currentView = "blogDetail";
        window.selectedPostId = postId;
        render();
      });
    });
  }

  function renderBlogDetail(container) {
    const postId = window.selectedPostId;
    const post = posts.find(p => p.id === postId);
    if (!post) { container.innerHTML = `<div class="panel">Essay not found</div>`; return; }
    container.innerHTML = `
      <div class="panel">
        <button class="btn" id="backHomeBtn" style="margin-bottom:1rem;">← Back to Journal</button>
        <h1 style="font-size:clamp(2rem,5vw,3rem);">${escapeHtml(post.title)}</h1>
        <p style="color:#8F7A5C; margin:0.5rem 0 1rem 0;">By ${escapeHtml(post.author)} • ${post.date}</p>
        ${post.imageUrl ? `<img src="${post.imageUrl}" style="width:100%; max-height:420px; object-fit:cover; border-radius:24px; margin:1.2rem 0;" alt="featured" onerror="this.style.display='none'">` : ''}
        <div style="white-space: pre-wrap; line-height:1.65; font-size:1.05rem; color:#2B2B2B;">${escapeHtml(post.content)}</div>
        <hr />
        <p style="font-style:italic;">✍️ Enjoyed this? <strong>Subscribe monthly</strong> to support independent writing and get exclusive resources.</p>
      </div>
    `;
    document.getElementById('backHomeBtn')?.addEventListener('click', () => {
      currentView = "home";
      render();
    });
  }

  function renderAccount(container) {
    if (!currentUser) {
      container.innerHTML = `<div class="panel"><p>Please log in to view your library.</p><button class="btn btn-dark" id="gotoLogin">Log in</button></div>`;
      document.getElementById('gotoLogin')?.addEventListener('click',()=>{ currentView="login"; render(); });
      return;
    }
    const validSub = isSubscriptionValid(currentUser);
    const subStatus = validSub ? `✅ Active until ${new Date(currentUser.subscription.expiryDate).toDateString()}` : (currentUser.subscription.active ? 'Expired' : 'No active subscription');
    container.innerHTML = `
      <div class="panel">
        <h2>Welcome, ${escapeHtml(currentUser.name)}</h2>
        <p><strong>Email:</strong> ${escapeHtml(currentUser.email)}</p>
        <p><strong>Role:</strong> ${currentUser.isAdmin ? "Writer & Admin" : "Reader"}</p>
        <div class="subscription-badge" style="margin: 1rem 0;">📖 Subscription: ${subStatus}</div>
        <div style="background:#F9F5EF; padding:1.5rem; border-radius:24px;">
          <h3>✍️ Support Word Well — Monthly Membership</h3>
          <p>Subscribe for $9.99/month and unlock writing tips, early essays, and help sustain authentic content.</p>
          ${validSub ? `<button class="btn" id="cancelSubBtn">Cancel Membership</button>` : `<button class="btn btn-dark" id="startSubBtn">Become a Member (Demo)</button>`}
          <p style="font-size:0.75rem; margin-top:0.75rem;">*Demo: one-click mock subscription, no real payment.</p>
        </div>
      </div>
    `;
    if (validSub) {
      document.getElementById('cancelSubBtn')?.addEventListener('click', () => {
        setUserSubscription(currentUser.id, false);
        alert("Membership cancelled. You can resubscribe anytime.");
        render();
      });
    } else {
      document.getElementById('startSubBtn')?.addEventListener('click', () => {
        setUserSubscription(currentUser.id, true, 1);
        alert("🎉 Membership activated! Valid for 30 days (demo). Thank you for supporting Word Well!");
        render();
      });
    }
  }

  // ADMIN PANEL: classic writer's dashboard
  function renderAdminPanel(container) {
    if (!currentUser || !currentUser.isAdmin) { container.innerHTML = `<div>Access denied</div>`; return; }
    let html = `<div class="panel"><div class="flex-between"><h2>Writer’s Desk</h2><button class="btn btn-dark" id="newPostBtn">+ New Essay</button></div><div id="adminPostsList"></div></div>`;
    container.innerHTML = html;
    function renderPostList() {
      const listDiv = document.getElementById('adminPostsList');
      if (!listDiv) return;
      if (posts.length === 0) { listDiv.innerHTML = '<p>No essays yet. Begin writing.</p>'; return; }
      let listHtml = `<div style="margin-top:1.5rem;">`;
      posts.forEach(post => {
        listHtml += `<div style="border-bottom:1px solid #F0E7DC; padding:1rem 0; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
          <span><strong>${escapeHtml(post.title)}</strong> <span style="color:#9F8B6F;">(${post.date})</span></span>
          <div><button class="btn editPostBtn" data-id="${post.id}" style="margin-right:8px;">✏️ Edit</button> <button class="btn deletePostBtn" data-id="${post.id}" style="background:#E9DFD3;">🗑 Delete</button></div>
        </div>`;
      });
      listHtml += `</div>`;
      listDiv.innerHTML = listHtml;
      document.querySelectorAll('.editPostBtn').forEach(btn => {
        btn.addEventListener('click', (e) => { editPostForm(btn.getAttribute('data-id')); });
      });
      document.querySelectorAll('.deletePostBtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          if (confirm("Permanently delete this essay?")) {
            posts = posts.filter(p => p.id !== btn.getAttribute('data-id'));
            savePosts();
            renderAdminPanel(container);
          }
        });
      });
    }
    renderPostList();
    document.getElementById('newPostBtn')?.addEventListener('click', () => showPostForm(null));
    function showPostForm(postToEdit = null) {
      const isEdit = !!postToEdit;
      const formHtml = `
        <div class="panel" id="postFormModal" style="margin-top:1rem;">
          <h3>${isEdit ? 'Revise Essay' : 'Draft New Essay'}</h3>
          <div class="form-group"><label>Title</label><input id="postTitle" value="${escapeHtml(isEdit ? postToEdit.title : '')}" /></div>
          <div class="form-group"><label>Full text</label><textarea id="postContent" rows="6">${escapeHtml(isEdit ? postToEdit.content : '')}</textarea></div>
          <div class="form-group"><label>Image URL (optional)</label><input id="postImage" value="${escapeHtml(isEdit ? (postToEdit.imageUrl || '') : '')}" placeholder="https://..." /></div>
          <button class="btn btn-dark" id="savePostBtn">Save</button>
          <button class="btn" id="cancelPostBtn">Cancel</button>
        </div>`;
      const existing = document.getElementById('postFormModal');
      if(existing) existing.remove();
      container.insertAdjacentHTML('beforeend', formHtml);
      document.getElementById('savePostBtn')?.addEventListener('click', () => {
        const title = document.getElementById('postTitle').value.trim();
        const content = document.getElementById('postContent').value.trim();
        const imageUrl = document.getElementById('postImage').value.trim();
        if (!title || !content) { alert("Title and content required."); return; }
        if (isEdit) {
          postToEdit.title = title;
          postToEdit.content = content;
          postToEdit.imageUrl = imageUrl || null;
          savePosts();
        } else {
          const newPost = { id: "p" + Date.now(), title, content, imageUrl: imageUrl || null, date: new Date().toISOString().slice(0,10), author: currentUser.name };
          posts.unshift(newPost);
          savePosts();
        }
        document.getElementById('postFormModal')?.remove();
        renderAdminPanel(container);
      });
      document.getElementById('cancelPostBtn')?.addEventListener('click', () => { document.getElementById('postFormModal')?.remove(); });
    }
    function editPostForm(postId) {
      const post = posts.find(p => p.id === postId);
      if(post) showPostForm(post);
    }
  }

  // AUTH VIEWS
  function renderLogin(container) {
    container.innerHTML = `<div class="panel"><h2>Log in to Word Well</h2><div id="loginError" class="error"></div>
    <div class="form-group"><label>Email</label><input id="loginEmail" type="email" /></div>
    <div class="form-group"><label>Password</label><input id="loginPassword" type="password" /></div>
    <button class="btn btn-dark" id="doLoginBtn">Access library</button>
    <p style="margin-top:1rem;">No account? <button class="nav-btn" id="switchToReg">Create profile</button></p></div>`;
    document.getElementById('doLoginBtn')?.addEventListener('click', () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pwd = document.getElementById('loginPassword').value.trim();
      const user = users.find(u => u.email === email && u.password === pwd);
      if (user) { currentUser = { ...user }; saveCurrentUser(); currentView = "home"; render(); } 
      else { document.getElementById('loginError').innerText = "Invalid credentials."; }
    });
    document.getElementById('switchToReg')?.addEventListener('click', () => { currentView = "register"; render(); });
  }

  function renderRegister(container) {
    container.innerHTML = `<div class="panel"><h2>Become a reader</h2><div id="regError" class="error"></div>
    <div class="form-group"><label>Full name</label><input id="regName" /></div>
    <div class="form-group"><label>Email</label><input id="regEmail" type="email" /></div>
    <div class="form-group"><label>Password</label><input id="regPassword" type="password" /></div>
    <button class="btn btn-dark" id="doRegBtn">Sign up — free</button>
    <p>Already a reader? <button class="nav-btn" id="switchToLogin">Log in</button></p></div>`;
    document.getElementById('doRegBtn')?.addEventListener('click', () => {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPassword').value.trim();
      if (!name || !email || !pass) { document.getElementById('regError').innerText = "All fields required."; return; }
      if (findUserByEmail(email)) { document.getElementById('regError').innerText = "Email already registered."; return; }
      const newUser = { id: "u"+Date.now(), name, email, password: pass, isAdmin: false, subscription: { active: false, expiryDate: null, plan: null } };
      users.push(newUser);
      saveUsers();
      currentUser = { ...newUser };
      saveCurrentUser();
      currentView = "home";
      render();
    });
    document.getElementById('switchToLogin')?.addEventListener('click', () => { currentView = "login"; render(); });
  }

  function bindNavEvents() {
    document.querySelectorAll('[data-nav]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const nav = btn.getAttribute('data-nav');
        if (nav === 'home') currentView = "home";
        else if (nav === 'account') currentView = "account";
        else if (nav === 'admin') { if (currentUser && currentUser.isAdmin) currentView = "admin"; else alert("Admin only"); }
        render();
      });
    });
    document.getElementById('loginNavBtn')?.addEventListener('click', () => { currentView = "login"; render(); });
    document.getElementById('registerNavBtn')?.addEventListener('click', () => { currentView = "register"; render(); });
    document.getElementById('logoutBtn')?.addEventListener('click', () => { currentUser = null; localStorage.removeItem('wordwell_currentUser'); currentView = "home"; render(); });
  }

  function init() {
    loadData();
    bindNavEvents();
    render();
  }
  init();
</script>
</body>
  </html>
