<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Word Well — Christian Télémaque | Freelance Content Writing</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
    }

    body {
      background: #fefcf5;
      color: #1e1a2f;
      line-height: 1.5;
    }

    /* banner container — you can replace background image with your own */
    .hero-banner {
      width: 100%;
      height: 360px;
      background-size: cover;
      background-position: center 35%;
      background-repeat: no-repeat;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      /* fallback gradient matches earthy/warm tones */
      background-color: #2c3e2f;
      background-image: linear-gradient(135deg, #1f3b2c, #ab8e5c);
    }

    .banner-overlay {
      background: rgba(0, 0, 0, 0.5);
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      backdrop-filter: brightness(0.95);
    }

    .banner-text h1 {
      font-size: 3.4rem;
      letter-spacing: -0.02em;
      color: white;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    .banner-text p {
      font-size: 1.3rem;
      color: #f9eec1;
      margin-top: 0.5rem;
      font-weight: 500;
    }

    /* navbar */
    .navbar {
      background: #ffffffdd;
      backdrop-filter: blur(12px);
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      padding: 1rem 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #2b5e2f, #b8860b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav-btn {
      background: none;
      border: none;
      font-weight: 500;
      font-size: 1rem;
      cursor: pointer;
      padding: 0.5rem 0.8rem;
      transition: 0.2s;
      border-radius: 40px;
      color: #2c3e2f;
    }

    .nav-btn:hover {
      background: #f0ebe0;
    }

    .btn-primary {
      background: #2b5e2f;
      color: white;
      border-radius: 40px;
      padding: 0.5rem 1.2rem;
    }

    .btn-primary-outline {
      border: 1px solid #2b5e2f;
      background: transparent;
      color: #2b5e2f;
    }

    /* main container */
    .container {
      max-width: 1280px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    /* profile & author card */
    .author-card {
      background: white;
      border-radius: 2rem;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      box-shadow: 0 6px 14px rgba(0,0,0,0.03);
      border: 1px solid #ede6d8;
    }

    .profile-pic {
      width: 85px;
      height: 85px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #b8860b;
      background: #e0d6c5;
    }

    .author-info h3 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .social-links a {
      text-decoration: none;
      color: #2b5e2f;
      margin-right: 1rem;
      font-weight: 500;
    }

    /* blog grid */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 1rem;
    }

    .blog-card {
      background: white;
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
      transition: transform 0.2s;
      border: 1px solid #f0e7da;
    }

    .blog-card:hover {
      transform: translateY(-5px);
    }

    .blog-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #e9e1d2;
    }

    .blog-card-content {
      padding: 1.2rem;
    }

    .blog-title {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .blog-excerpt {
      color: #4a4a4a;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .read-link {
      background: none;
      border: none;
      color: #b8860b;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }

    /* panels & forms */
    .panel {
      background: white;
      border-radius: 2rem;
      padding: 2rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      margin: 1rem 0;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      font-weight: 500;
      display: block;
      margin-bottom: 0.3rem;
    }

    input, textarea, select {
      width: 100%;
      padding: 0.8rem;
      border-radius: 1rem;
      border: 1px solid #ddd2c0;
      background: #fefaf5;
    }

    button {
      cursor: pointer;
    }

    .btn {
      padding: 0.7rem 1.4rem;
      border-radius: 2rem;
      border: none;
      font-weight: 600;
      background: #ede0cf;
      transition: 0.2s;
    }

    .btn-dark {
      background: #2b5e2f;
      color: white;
    }

    .subscription-badge {
      background: #e9f5e9;
      padding: 0.5rem 1rem;
      border-radius: 3rem;
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .error {
      color: #c7254e;
      font-size: 0.85rem;
    }

    footer {
      background: #1e2a21;
      color: #e0d9c6;
      text-align: center;
      padding: 2rem;
      margin-top: 3rem;
    }

    hr {
      margin: 1rem 0;
    }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .admin-actions {
      margin-bottom: 1rem;
    }
    @media (max-width: 700px) {
      .navbar { flex-direction: column; gap: 0.8rem; }
      .banner-text h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

<!-- BANNER section - replace background-image with your own image URL if needed -->
<div class="hero-banner" id="heroBanner">
  <div class="banner-overlay">
    <div class="banner-text">
      <h1>Word Well</h1>
      <p>Freelance Content Writer | SEO Blog Posts, Copywriting & Ghostwriting</p>
    </div>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">✍️ Word Well</div>
  <div class="nav-links">
    <button class="nav-btn" data-nav="home">📖 Blog</button>
    <button class="nav-btn" data-nav="account">👤 My Account</button>
    <button id="adminNavBtn" class="nav-btn" style="display: none;">⚙️ Admin Panel</button>
    <button id="loginNavBtn" class="nav-btn btn-primary-outline">🔐 Login</button>
    <button id="registerNavBtn" class="nav-btn btn-primary">📝 Sign Up</button>
    <button id="logoutBtn" class="nav-btn" style="display: none;">🚪 Logout</button>
  </div>
</div>

<!-- MAIN DYNAMIC VIEW -->
<div id="appContainer" class="container"></div>

<footer>
  <p>© 2025 Word Well — Freelance Content Writing by Christian Télémaque</p>
  <p id="footerLinks">🔗 <a id="linkedinFooter" href="#" target="_blank" style="color:#d4c3a2;">LinkedIn</a> &nbsp;| ✉️ <span id="emailFooter"></span></p>
</footer>

<script>
  // ========== YOUR PERSONAL BRAND CONFIGURATION ==========
  const CONFIG = {
    // Replace with your actual banner image URL (or keep the gradient fallback)
    bannerImageURL: "",   // leave empty to use CSS gradient; else put your image link e.g., "https://your-image.jpg"
    // Profile picture (you can replace with any image URL)
    profilePictureURL: "https://ui-avatars.com/api/?background=2b5e2f&color=fff&name=Christian+Télémaque&size=128",
    linkedIn: "https://www.linkedin.com/in/christian-telemaque-writer",
    email: "christiantelemaque@gmail.com",
    writerName: "Christian Télémaque"
  };

  // Apply banner background: if user provides image, use it; otherwise keep gradient.
  const bannerDiv = document.getElementById('heroBanner');
  if (CONFIG.bannerImageURL && CONFIG.bannerImageURL.trim() !== "") {
    bannerDiv.style.backgroundImage = `url(${CONFIG.bannerImageURL})`;
    bannerDiv.style.backgroundSize = "cover";
  } else {
    // keep the original gradient as a beautiful earthy banner
    bannerDiv.style.background = "linear-gradient(135deg, #1f3b2c, #ab8e5c)";
  }
  
  // set footer links and email
  const linkedinFooter = document.getElementById('linkedinFooter');
  if(linkedinFooter) linkedinFooter.href = CONFIG.linkedIn;
  const emailFooterSpan = document.getElementById('emailFooter');
  if(emailFooterSpan) emailFooterSpan.innerText = CONFIG.email;
  
  // ========== DATA MODELS (localStorage) ==========
  let users = [];
  let posts = [];
  let currentUser = null;

  function loadData() {
    const storedUsers = localStorage.getItem('wordwell_users');
    const storedPosts = localStorage.getItem('wordwell_posts');
    users = storedUsers ? JSON.parse(storedUsers) : [];
    posts = storedPosts ? JSON.parse(storedPosts) : [];
    // ensure default admin & demo blog posts if empty
    if (users.length === 0) {
      users.push({
        id: "u1",
        name: CONFIG.writerName,
        email: CONFIG.email,
        password: "Admin123",   // demo password - you can change after login
        isAdmin: true,
        subscription: { active: false, expiryDate: null, plan: null }
      });
      // demo reader
      users.push({
        id: "u2",
        name: "Reader Demo",
        email: "reader@example.com",
        password: "reader123",
        isAdmin: false,
        subscription: { active: false, expiryDate: null, plan: null }
      });
      localStorage.setItem('wordwell_users', JSON.stringify(users));
    }
    if (posts.length === 0) {
      posts = [
        { id: "p1", title: "Why authentic storytelling wins in 2025", content: "In a world flooded with AI content, genuine human narrative creates emotional connection. As a freelance writer, I craft each sentence with care — blending SEO research with natural storytelling. Whether you need website copy, blog posts, or ghostwriting, Word Well delivers words that resonate. This demo post shows how clarity and voice can transform your brand.", date: "2025-04-01", author: CONFIG.writerName, imageUrl: "https://images.pexels.com/photos/1181675/pexels-photo-1181675.jpeg?auto=compress&cs=tinysrgb&w=600" },
        { id: "p2", title: "SEO writing that actually reads well", content: "Search engines love relevance, but humans love personality. Combining both is an art. I provide SEO-optimised content that doesn't sound robotic — from long-form articles to persuasive landing pages. Monthly subscribers get exclusive templates, SEO checklists, and early access to new articles. Subscribe to support independent writing.", date: "2025-04-05", author: CONFIG.writerName, imageUrl: "https://images.pexels.com/photos/270404/pexels-photo-270404.jpeg?auto=compress&cs=tinysrgb&w=600" },
        { id: "p3", title: "Ghostwriting: bringing your voice to life", content: "You have ideas, but not the time to write. Ghostwriting bridges that gap. I've helped executives, founders, and creators produce authentic LinkedIn posts, newsletters, and even books. Every piece sounds like you — just more polished. Let's collaborate on your next project.", date: "2025-04-10", author: CONFIG.writerName, imageUrl: "https://images.pexels.com/photos/4145190/pexels-photo-4145190.jpeg?auto=compress&cs=tinysrgb&w=600" }
      ];
      localStorage.setItem('wordwell_posts', JSON.stringify(posts));
    }
    const storedCurrent = localStorage.getItem('wordwell_currentUser');
    if (storedCurrent) currentUser = JSON.parse(storedCurrent);
    else currentUser = null;
  }

  function saveUsers() { localStorage.setItem('wordwell_users', JSON.stringify(users)); }
  function savePosts() { localStorage.setItem('wordwell_posts', JSON.stringify(posts)); }
  function saveCurrentUser() {
    if (currentUser) localStorage.setItem('wordwell_currentUser', JSON.stringify(currentUser));
    else localStorage.removeItem('wordwell_currentUser');
  }

  function findUserByEmail(email) { return users.find(u => u.email === email); }

  function setUserSubscription(userId, active, months = 1) {
    const userIndex = users.findIndex(u => u.id === userId);
    if (userIndex === -1) return false;
    let expiry = null;
    if (active) {
      const date = new Date();
      date.setMonth(date.getMonth() + months);
      expiry = date.toISOString();
    }
    users[userIndex].subscription = { active, expiryDate: expiry, plan: active ? 'monthly' : null };
    saveUsers();
    if (currentUser && currentUser.id === userId) {
      currentUser = users[userIndex];
      saveCurrentUser();
    }
    return true;
  }

  function isSubscriptionValid(user) {
    if (!user.subscription.active) return false;
    if (!user.subscription.expiryDate) return false;
    const expiry = new Date(user.subscription.expiryDate);
    return expiry > new Date();
  }

  // ========== RENDER ENGINE ==========
  let currentView = "home";

  function render() {
    const container = document.getElementById('appContainer');
    if (!container) return;

    const loginBtn = document.getElementById('loginNavBtn');
    const registerBtn = document.getElementById('registerNavBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const adminNav = document.getElementById('adminNavBtn');
    if (currentUser) {
      loginBtn.style.display = 'none';
      registerBtn.style.display = 'none';
      logoutBtn.style.display = 'inline-block';
      if (currentUser.isAdmin) adminNav.style.display = 'inline-block';
      else adminNav.style.display = 'none';
    } else {
      loginBtn.style.display = 'inline-block';
      registerBtn.style.display = 'inline-block';
      logoutBtn.style.display = 'none';
      adminNav.style.display = 'none';
    }

    if (currentView === "home") renderHome(container);
    else if (currentView === "account") renderAccount(container);
    else if (currentView === "admin") {
      if (currentUser && currentUser.isAdmin) renderAdminPanel(container);
      else { alert("Admin access only."); currentView = "home"; render(); }
    }
    else if (currentView === "blogDetail") renderBlogDetail(container);
    else if (currentView === "login") renderLogin(container);
    else if (currentView === "register") renderRegister(container);
    else renderHome(container);
  }

  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  
  function getExcerpt(content, len=110) {
    return content.length > len ? content.slice(0, len) + "…" : content;
  }

  function renderHome(container) {
    if (!posts.length) {
      container.innerHTML = `<div class="panel"><p>No blog posts yet. Admin can write one.</p></div>`;
      return;
    }
    let html = `<div class="author-card">
      <img class="profile-pic" src="${CONFIG.profilePictureURL}" alt="Christian Télémaque profile">
      <div class="author-info">
        <h3>${CONFIG.writerName}</h3>
        <p>Freelance content writer & strategist. Human-first, SEO-smart storytelling. Based on authentic voice for brands and creators.</p>
        <div class="social-links">
          <a href="${CONFIG.linkedIn}" target="_blank">🔗 LinkedIn</a>
          <a href="mailto:${CONFIG.email}">✉️ ${CONFIG.email}</a>
        </div>
      </div>
    </div>
    <h2>📚 Latest articles from Word Well</h2>
    <div class="blog-grid">`;
    
    posts.slice().reverse().forEach(post => {
      html += `
        <div class="blog-card">
          <img class="blog-img" src="${post.imageUrl || 'https://images.pexels.com/photos/256514/pexels-photo-256514.jpeg?auto=compress&cs=tinysrgb&w=600'}" alt="blog visual" onerror="this.src='https://placehold.co/600x400/ede0cf/2b5e2f?text=Word+Well'">
          <div class="blog-card-content">
            <div class="blog-title">${escapeHtml(post.title)}</div>
            <div class="blog-excerpt">${escapeHtml(getExcerpt(post.content, 90))}</div>
            <button class="read-link" data-postid="${post.id}">Read full story →</button>
            <div style="font-size:0.75rem; margin-top:8px; color:#8b7a66;">📅 ${post.date} • by ${escapeHtml(post.author)}</div>
          </div>
        </div>`;
    });
    html += `</div>`;
    container.innerHTML = html;
    document.querySelectorAll('.read-link').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const postId = btn.getAttribute('data-postid');
        if (!currentUser) {
          alert("🔐 Please login or create a free account to read full blog posts.");
          currentView = "login";
          render();
          return;
        }
        currentView = "blogDetail";
        window.selectedPostId = postId;
        render();
      });
    });
  }

  function renderBlogDetail(container) {
    const postId = window.selectedPostId;
    const post = posts.find(p => p.id === postId);
    if (!post) { container.innerHTML = `<div class="panel">Post not found</div>`; return; }
    container.innerHTML = `
      <div class="panel">
        <button class="btn" id="backHomeBtn">← Back to Blog</button>
        <h1 style="margin:1rem 0 0.5rem">${escapeHtml(post.title)}</h1>
        <p style="color:#7c6b4f;">By ${escapeHtml(post.author)} • ${post.date}</p>
        ${post.imageUrl ? `<img src="${post.imageUrl}" style="width:100%; max-height:400px; object-fit:cover; border-radius:1.5rem; margin:1rem 0;" alt="blog image" onerror="this.style.display='none'">` : ''}
        <div style="white-space: pre-wrap; line-height:1.6; font-size:1.05rem;">${escapeHtml(post.content)}</div>
        <hr />
        <p><em>✍️ Loved this article? <strong>Subscribe monthly</strong> to support independent writing and get exclusive resources.</em></p>
      </div>
    `;
    document.getElementById('backHomeBtn')?.addEventListener('click', () => {
      currentView = "home";
      render();
    });
  }

  function renderAccount(container) {
    if (!currentUser) {
      container.innerHTML = `<div class="panel"><p>Please login to view your account.</p><button class="btn btn-dark" id="gotoLogin">Login</button></div>`;
      document.getElementById('gotoLogin')?.addEventListener('click',()=>{ currentView="login"; render(); });
      return;
    }
    const validSub = isSubscriptionValid(currentUser);
    const subStatus = validSub ? `✅ Active until ${new Date(currentUser.subscription.expiryDate).toDateString()}` : (currentUser.subscription.active ? 'Expired' : 'No active subscription');
    container.innerHTML = `
      <div class="panel">
        <h2>👋 Welcome back, ${escapeHtml(currentUser.name)}</h2>
        <p><strong>Email:</strong> ${escapeHtml(currentUser.email)}</p>
        <p><strong>Role:</strong> ${currentUser.isAdmin ? "Writer & Admin" : "Reader"}</p>
        <div class="subscription-badge" style="margin: 1rem 0;">📅 Monthly Subscription: ${subStatus}</div>
        <div style="background:#f9f3ea; padding:1.2rem; border-radius:1.5rem;">
          <h3>🌟 Support Word Well — Monthly Subscription</h3>
          <p>Subscribe for $9.99/month and get access to exclusive writing tips, early blog access, and help sustain authentic content.</p>
          ${validSub ? `<button class="btn" id="cancelSubBtn">Cancel Subscription</button>` : `<button class="btn btn-dark" id="startSubBtn">Start Monthly Subscription (Demo)</button>`}
          <p style="font-size:0.8rem; margin-top:0.5rem;">*Demo: one-click mock subscription, no real payment.</p>
        </div>
      </div>
    `;
    if (validSub) {
      document.getElementById('cancelSubBtn')?.addEventListener('click', () => {
        setUserSubscription(currentUser.id, false);
        alert("Subscription cancelled. You can resubscribe anytime.");
        render();
      });
    } else {
      document.getElementById('startSubBtn')?.addEventListener('click', () => {
        setUserSubscription(currentUser.id, true, 1);
        alert("🎉 Subscription activated! Valid for 30 days (demo). Thank you for supporting Word Well!");
        render();
      });
    }
  }

  // ADMIN PANEL: full blog management
  function renderAdminPanel(container) {
    if (!currentUser || !currentUser.isAdmin) { container.innerHTML = `<div>Access denied</div>`; return; }
    let html = `<div class="panel"><div class="flex-between"><h2>📝 Admin Dashboard — Manage Blog Posts</h2><button class="btn btn-dark" id="newPostBtn">+ Create New Post</button></div><div id="adminPostsList"></div></div>`;
    container.innerHTML = html;
    function renderPostList() {
      const listDiv = document.getElementById('adminPostsList');
      if (!listDiv) return;
      if (posts.length === 0) { listDiv.innerHTML = '<p>No posts yet. Create your first blog.</p>'; return; }
      let listHtml = `<div style="margin-top:1.5rem;">`;
      posts.forEach(post => {
        listHtml += `<div style="border:1px solid #e2d5c0; border-radius:1.5rem; padding:1rem; margin-bottom:1rem;">
          <strong>${escapeHtml(post.title)}</strong> <small>(${post.date})</small>
          <div style="margin-top:0.5rem;"><button class="btn editPostBtn" data-id="${post.id}">✏️ Edit</button> <button class="btn deletePostBtn" data-id="${post.id}" style="background:#e6ccc2;">🗑 Delete</button></div>
        </div>`;
      });
      listHtml += `</div>`;
      listDiv.innerHTML = listHtml;
      document.querySelectorAll('.editPostBtn').forEach(btn => {
        btn.addEventListener('click', (e) => { editPostForm(btn.getAttribute('data-id')); });
      });
      document.querySelectorAll('.deletePostBtn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          if (confirm("Delete this post permanently?")) {
            const id = btn.getAttribute('data-id');
            posts = posts.filter(p => p.id !== id);
            savePosts();
            renderAdminPanel(container);
          }
        });
      });
    }
    renderPostList();
    document.getElementById('newPostBtn')?.addEventListener('click', () => showPostForm(null));
    function showPostForm(postToEdit = null) {
      const isEdit = !!postToEdit;
      const titleVal = isEdit ? postToEdit.title : '';
      const contentVal = isEdit ? postToEdit.content : '';
      const imgVal = isEdit ? postToEdit.imageUrl || '' : '';
      const formHtml = `
        <div class="panel" id="postFormModal" style="margin-top:1rem;">
          <h3>${isEdit ? 'Edit Post' : 'Write New Blog'}</h3>
          <div class="form-group"><label>Title</label><input id="postTitle" value="${escapeHtml(titleVal)}" /></div>
          <div class="form-group"><label>Content (full article)</label><textarea id="postContent" rows="6">${escapeHtml(contentVal)}</textarea></div>
          <div class="form-group"><label>Image URL (optional)</label><input id="postImage" value="${escapeHtml(imgVal)}" placeholder="https://..."/></div>
          <button class="btn btn-dark" id="savePostBtn">💾 Save Post</button>
          <button class="btn" id="cancelPostBtn">Cancel</button>
        </div>`;
      const existing = document.getElementById('postFormModal');
      if(existing) existing.remove();
      container.insertAdjacentHTML('beforeend', formHtml);
      document.getElementById('savePostBtn')?.addEventListener('click', () => {
        const title = document.getElementById('postTitle').value.trim();
        const content = document.getElementById('postContent').value.trim();
        const imageUrl = document.getElementById('postImage').value.trim();
        if (!title || !content) { alert("Title and content required."); return; }
        if (isEdit) {
          postToEdit.title = title;
          postToEdit.content = content;
          postToEdit.imageUrl = imageUrl || null;
          savePosts();
        } else {
          const newPost = {
            id: "p" + Date.now(),
            title, content, imageUrl: imageUrl || null,
            date: new Date().toISOString().slice(0,10),
            author: currentUser.name,
          };
          posts.unshift(newPost);
          savePosts();
        }
        document.getElementById('postFormModal')?.remove();
        renderAdminPanel(container);
      });
      document.getElementById('cancelPostBtn')?.addEventListener('click', () => {
        document.getElementById('postFormModal')?.remove();
      });
    }
    function editPostForm(postId) {
      const post = posts.find(p => p.id === postId);
      if(post) showPostForm(post);
      else alert("Post not found");
    }
  }

  // AUTH VIEWS
  function renderLogin(container) {
    container.innerHTML = `<div class="panel"><h2>Log in to Word Well</h2><div id="loginError" class="error"></div>
    <div class="form-group"><label>Email</label><input id="loginEmail" type="email" /></div>
    <div class="form-group"><label>Password</label><input id="loginPassword" type="password" /></div>
    <button class="btn btn-dark" id="doLoginBtn">Login</button>
    <p style="margin-top:1rem;">Don't have account? <button class="nav-btn" id="switchToReg">Sign up</button></p></div>`;
    document.getElementById('doLoginBtn')?.addEventListener('click', () => {
      const email = document.getElementById('loginEmail').value.trim();
      const pwd = document.getElementById('loginPassword').value.trim();
      const user = users.find(u => u.email === email && u.password === pwd);
      if (user) {
        currentUser = { ...user };
        saveCurrentUser();
        currentView = "home";
        render();
      } else {
        document.getElementById('loginError').innerText = "Invalid email or password.";
      }
    });
    document.getElementById('switchToReg')?.addEventListener('click', () => { currentView = "register"; render(); });
  }

  function renderRegister(container) {
    container.innerHTML = `<div class="panel"><h2>Create free account</h2><div id="regError" class="error"></div>
    <div class="form-group"><label>Full name</label><input id="regName" /></div>
    <div class="form-group"><label>Email</label><input id="regEmail" type="email" /></div>
    <div class="form-group"><label>Password</label><input id="regPassword" type="password" /></div>
    <button class="btn btn-dark" id="doRegBtn">Sign up & read blogs</button>
    <p>Already have account? <button class="nav-btn" id="switchToLogin">Login</button></p></div>`;
    document.getElementById('doRegBtn')?.addEventListener('click', () => {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPassword').value.trim();
      if (!name || !email || !pass) { document.getElementById('regError').innerText = "All fields required"; return; }
      if (findUserByEmail(email)) { document.getElementById('regError').innerText = "Email already exists"; return; }
      const newUser = {
        id: "u"+Date.now(),
        name, email, password: pass,
        isAdmin: false,
        subscription: { active: false, expiryDate: null, plan: null }
      };
      users.push(newUser);
      saveUsers();
      currentUser = { ...newUser };
      saveCurrentUser();
      currentView = "home";
      render();
    });
    document.getElementById('switchToLogin')?.addEventListener('click', () => { currentView = "login"; render(); });
  }

  // Navigation events
  function bindNavEvents() {
    document.querySelectorAll('[data-nav]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const nav = btn.getAttribute('data-nav');
        if (nav === 'home') currentView = "home";
        else if (nav === 'account') currentView = "account";
        else if (nav === 'admin') { if (currentUser && currentUser.isAdmin) currentView = "admin"; else alert("Admin only"); }
        render();
      });
    });
    document.getElementById('loginNavBtn')?.addEventListener('click', () => { currentView = "login"; render(); });
    document.getElementById('registerNavBtn')?.addEventListener('click', () => { currentView = "register"; render(); });
    document.getElementById('logoutBtn')?.addEventListener('click', () => { currentUser = null; localStorage.removeItem('wordwell_currentUser'); currentView = "home"; render(); });
  }

  function init() {
    loadData();
    bindNavEvents();
    render();
  }
  init();
</script>
</body>
  </html>
